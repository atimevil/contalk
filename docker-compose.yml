# 계약똑똑 로컬 개발 환경 전체 스택
# 사용법: docker compose up -d
#
# 최초 실행 후 DB 마이그레이션:
#   docker compose exec backend alembic upgrade head

services:
  # ─────────────────────────────────────────
  # FastAPI 백엔드
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    container_name: contalktok_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/contalktok
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000           # 컨테이너 내부 포트 (chromadb 서비스 내부)
      - LOCAL_UPLOAD_DIR=/tmp/contalktok_uploads  # AWS 미설정 시 로컬 저장
      - HF_HOME=/home/appuser/.cache/huggingface  # HuggingFace 캐시 경로 (appuser 쓰기 가능)
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_storage
      - ./data/hf_cache:/home/appuser/.cache/huggingface  # KLUE-RoBERTa 모델 캐시 (bind mount → appuser 쓰기 권한)
      - ./data/uploads:/tmp/contalktok_uploads  # bind mount → appuser 쓰기 권한 확보
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Vite 프론트엔드 개발 서버
  # ─────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: contalktok_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://backend:8000  # Docker 내부 서비스명 사용 (localhost X)
      - VITE_ENABLE_MOCK=false  # 실제 백엔드 사용 (true로 바꾸면 MSW Mock으로 전환)
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: contalktok_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: contalktok
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contalktok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: contalktok_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Celery 워커 (backend 이미지 재사용)
  # ─────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contalktok_celery
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - PYTHONPATH=/app             # ai.pipeline, app.* 모두 임포트 가능하도록
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/contalktok
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000           # 컨테이너 내부 포트
      - LOCAL_UPLOAD_DIR=/tmp/contalktok_uploads
      - HF_HOME=/home/appuser/.cache/huggingface  # HuggingFace 캐시 공유 (appuser 쓰기 가능)
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_storage
      - ./data/hf_cache:/home/appuser/.cache/huggingface  # backend 와 캐시 공유 (bind mount)
      - ./data/uploads:/tmp/contalktok_uploads  # bind mount — backend 와 공유
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q celery
    restart: unless-stopped

  # ─────────────────────────────────────────
  # ChromaDB (벡터 DB)
  # ─────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: contalktok_chromadb
    ports:
      - "8001:8000"  # 호스트 8001 → 컨테이너 내부 8000
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

# ─────────────────────────────────────────
# 볼륨 정의
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local
  hf_cache:        # KLUE-RoBERTa 모델 캐시 (첫 실행 후 영구 보존)
    driver: local
  # local_uploads: bind mount(./data/uploads)로 교체 — appuser 쓰기 권한 문제 해결
