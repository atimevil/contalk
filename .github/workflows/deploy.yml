name: CI/CD — 계약똑똑 배포 파이프라인

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2

# ─────────────────────────────────────────────────────────────────
# JOB 1: 백엔드 테스트
# ─────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: contalktok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/contalktok_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: ci-test-secret-key-not-for-production
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_REGION: ap-northeast-2
          S3_BUCKET_NAME: test-bucket
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/e2e \
            -x

# ─────────────────────────────────────────────────────────────────
# JOB 2: 프론트엔드 테스트 & 빌드 검증
# ─────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests & Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest (unit tests)
        run: npm run test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (프로덕션 빌드 검증)
        env:
          VITE_API_BASE_URL: https://api.contalktok.kr/api/v1
        run: npm run build

# ─────────────────────────────────────────────────────────────────
# JOB 3: 백엔드 배포 — EC2 SSH (main 브랜치만)
#   전제: EC2에 미리 `git clone`(~/contalktok) + 프로덕션 .env 작성 완료.
#   필요 Secrets: EC2_HOST(Elastic IP), EC2_USER(ec2-user), EC2_SSH_KEY(개인키)
# ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.contalktok.kr

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/contalktok
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker image prune -f

      - name: Health check after deploy
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            https://api.contalktok.kr/health \
            || (echo "Health check failed" && exit 1)

# ─────────────────────────────────────────────────────────────────
# JOB 4: 프론트엔드 S3 배포 + CloudFront 무효화 (main 브랜치만)
# ─────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [test-frontend, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://contalktok.kr

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        env:
          VITE_API_BASE_URL: https://api.contalktok.kr/api/v1
          VITE_KAKAO_APP_KEY: ${{ secrets.VITE_KAKAO_APP_KEY }}
          VITE_PORTONE_STORE_ID: ${{ secrets.VITE_PORTONE_STORE_ID }}
          VITE_PORTONE_CHANNEL_KEY: ${{ secrets.VITE_PORTONE_CHANNEL_KEY }}
          VITE_DEMO_MODE: 'false'
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          # JS/CSS/이미지 — 장기 캐시 (1년)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          # index.html — 캐시 없음 (항상 최신 버전)
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Frontend deployed to: https://contalktok.kr"
          echo "Git SHA: ${{ github.sha }}"
