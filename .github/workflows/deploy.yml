name: CI/CD — 계약똑똑 배포 파이프라인

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_BACKEND_REPO: contalktok-backend
  ECS_TASK_DEFINITION: contalktok-backend-task

# ─────────────────────────────────────────────────────────────────
# JOB 1: 백엔드 테스트
# ─────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: contalktok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt pytest pytest-asyncio httpx

      - name: Run pytest
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/contalktok_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          SECRET_KEY: ci-test-secret-key-not-for-production
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_REGION: ap-northeast-2
          S3_BUCKET_NAME: test-bucket
        run: |
          pytest tests/ -v --tb=short --asyncio-mode=auto \
            --ignore=tests/e2e \
            -x

# ─────────────────────────────────────────────────────────────────
# JOB 2: 프론트엔드 테스트 & 빌드 검증
# ─────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests & Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (프로덕션 빌드 검증)
        env:
          VITE_API_URL: https://api.contalktok.kr
        run: npm run build

# ─────────────────────────────────────────────────────────────────
# JOB 3: Docker 빌드 & ECR 푸시 (main 브랜치만)
# ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Output image URI
        run: |
          echo "Backend image pushed: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}:sha-${{ github.sha }}"

# ─────────────────────────────────────────────────────────────────
# JOB 4: ECS 백엔드 배포 (main 브랜치만)
# ─────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.contalktok.kr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: contalktok-backend
          image: ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}:sha-${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Health check after deploy
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            https://api.contalktok.kr/health \
            || (echo "Health check failed" && exit 1)

# ─────────────────────────────────────────────────────────────────
# JOB 5: 프론트엔드 S3 배포 + CloudFront 무효화 (main 브랜치만)
# ─────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [test-frontend, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://contalktok.kr

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        env:
          VITE_API_URL: https://api.contalktok.kr
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          # JS/CSS/이미지 — 장기 캐시 (1년)
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

          # index.html — 캐시 없음 (항상 최신 버전)
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "Frontend deployed to: https://contalktok.kr"
          echo "Git SHA: ${{ github.sha }}"
          echo "Deployed at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
