# Alembic 설정 파일
# 사용법:
#   alembic upgrade head          # 최신 마이그레이션 적용
#   alembic downgrade -1          # 한 버전 롤백
#   alembic revision --autogenerate -m "설명"  # 새 마이그레이션 생성

[alembic]
script_location = migrations
prepend_sys_path = .

# 단일 DB URL (DATABASE_URL 환경변수로 오버라이드됨)
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/contalktok

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
