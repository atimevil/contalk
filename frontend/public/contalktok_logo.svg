<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- 배경 그라데이션 -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <!-- 문서 용지 그라데이션 -->
    <linearGradient id="paper-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <!-- 메인 신뢰/안전 방패 배경 -->
  <path d="M60,10 C85,10 100,20 100,45 C100,75 75,105 60,112 C45,105 20,75 20,45 C20,20 35,10 60,10 Z" 
        fill="url(#bg-grad)" 
        stroke="#FFFFFF" 
        stroke-width="3"
        style="filter: drop-shadow(0px 6px 12px rgba(37, 99, 235, 0.25));" />

  <!-- 계약서 문서 아이콘 -->
  <rect x="42" y="32" width="36" height="46" rx="4" fill="url(#paper-grad)" transform="rotate(-6 60 55)" style="filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.1));" />
  
  <!-- 계약서 라인 선들 -->
  <line x1="48" y1="42" x2="68" y2="40" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" transform="rotate(-6 60 55)" />
  <line x1="48" y1="50" x2="72" y2="48" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" transform="rotate(-6 60 55)" />
  <line x1="48" y1="58" x2="62" y2="56" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" transform="rotate(-6 60 55)" />
  
  <!-- 똑똑함의 상징: 빛나는 AI 별 (Sparkle) -->
  <path d="M85,25 L87.5,31.5 L94,34 L87.5,36.5 L85,43 L82.5,36.5 L76,34 L82.5,31.5 Z" fill="#FBBF24" />
  <path d="M35,80 L36.2,83.2 L39.5,84.5 L36.2,85.8 L35,89 L33.8,85.8 L30.5,84.5 L33.8,83.2 Z" fill="#FBBF24" />

  <!-- 돋보기 (똑똑하게 들여다보는 분석) -->
  <circle cx="68" cy="68" r="14" fill="none" stroke="#FBBF24" stroke-width="4.5" style="filter: drop-shadow(0px 2px 6px rgba(0,0,0,0.2));" />
  <line x1="78" y1="78" x2="92" y2="92" stroke="#FBBF24" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- 돋보기 내 렌즈 하이라이트 -->
  <path d="M60,62 Q64,58 68,60" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none" />
</svg>
